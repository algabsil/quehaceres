<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Tâches Maison</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1F2A24">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #1F2A24;
    --surface: #283830;
    --surface-2: #324438;
    --gold: #E8B94A;
    --coral: #E2725B;
    --sage: #8FAE9B;
    --cream: #F4F1E8;
    --muted: #9FB0A6;
    --line: rgba(244,241,232,0.10);
    --radius: 14px;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 640px; margin: 0 auto; padding: 24px 18px 80px; }

  header{ margin-bottom: 18px; }
  .eyebrow{
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--sage); font-weight: 600; margin-bottom: 6px;
  }
  h1{
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 34px;
    margin: 0 0 4px; letter-spacing: -0.01em;
  }
  .today{ color: var(--muted); font-size: 14px; }

  .sync-status{
    display:flex; align-items:center; gap:8px; margin-top:14px;
    font-size: 12px; color: var(--muted);
  }
  .dot{ width:7px; height:7px; border-radius:50%; background: var(--sage); flex-shrink:0; }
  .dot.off{ background: var(--coral); }

  /* View switcher: Tâches / Courses */
  .view-tabs{ display:flex; gap:8px; margin-bottom: 18px; }
  .view-tab{
    flex:1; padding: 11px 8px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--surface); color: var(--muted); font-size: 14px; font-weight: 700;
    text-align:center; cursor:pointer; transition: all .15s ease;
  }
  .view-tab.active{ background: var(--sage); color: #1F2A24; border-color: var(--sage); }

  .notif-banner{
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 14px; font-size: 13px; color: var(--muted); margin-bottom: 18px;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .notif-banner button{
    background: var(--gold); border:none; color:#1F2A24; font-weight:700; font-size:12px;
    padding: 6px 12px; border-radius:6px; cursor:pointer; flex-shrink:0;
  }

  .who-tabs{ display:flex; gap:8px; margin: 0 0 10px; }
  .who-tab{
    flex:1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 600;
    text-align:center; cursor:pointer; transition: all .15s ease;
  }
  .who-tab.active{ background: var(--gold); color: #1F2A24; border-color: var(--gold); }

  .today-toggle-row{
    display:flex; align-items:center; gap:10px; margin-bottom: 18px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px;
  }
  .switch{ position:relative; width:38px; height:22px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{
    position:absolute; inset:0; background: var(--surface-2); border-radius:20px;
    cursor:pointer; transition: .15s;
  }
  .slider::before{
    content:""; position:absolute; width:16px; height:16px; left:3px; top:3px;
    background: var(--muted); border-radius:50%; transition: .15s;
  }
  .switch input:checked + .slider{ background: var(--sage); }
  .switch input:checked + .slider::before{ transform: translateX(16px); background: #1F2A24; }
  .today-toggle-text{ font-size: 13px; font-weight:600; }
  .today-toggle-sub{ font-size: 11px; color: var(--muted); }

  .template-row{ margin-bottom: 14px; }
  .template-label{ font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight:600; }
  .template-chips{ display:flex; flex-wrap:wrap; gap: 7px; }
  .template-chip{
    background: var(--surface); border: 1px solid var(--line); color: var(--cream);
    font-size: 12px; padding: 7px 12px; border-radius: 20px; cursor:pointer;
    transition: all .15s ease;
  }
  .template-chip:active{ background: var(--surface-2); }

  .add-card{
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; margin-bottom: 22px;
  }
  .add-row{ display:flex; gap:8px; margin-bottom: 10px; }
  .add-row:last-child{ margin-bottom: 0; }
  input[type=text], select, input[type=date], input[type=time]{
    background: var(--surface-2); border: 1px solid var(--line); color: var(--cream);
    border-radius: 8px; padding: 9px 10px; font-size: 14px; font-family: inherit;
    outline: none; width: 100%;
  }
  input[type=text]:focus, select:focus, input[type=date]:focus, input[type=time]:focus{
    border-color: var(--gold);
  }
  .add-row.title-row{ gap: 8px; }
  .add-row.title-row input{ flex:1; }
  .btn-add{
    background: var(--gold); color: #1F2A24; border:none; border-radius:8px;
    padding: 9px 16px; font-weight:700; font-size:14px; cursor:pointer; flex-shrink:0;
  }
  .btn-add:active{ transform: scale(0.97); }
  .field{ flex:1; }
  .field label{ display:block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .toggle-more{
    background:none; border:none; color: var(--sage); font-size:12px; cursor:pointer;
    padding: 4px 0; text-decoration: underline; text-underline-offset: 2px;
  }
  .more-fields{ display:none; flex-wrap: wrap; gap: 8px; margin-top:10px; }
  .more-fields.show{ display:flex; }
  .more-fields .field{ min-width: 110px; }
  .checkbox-field{
    display:flex; align-items:center; gap:8px; font-size:12px; color: var(--muted);
    width: 100%; margin-top: 4px;
  }
  .checkbox-field input{ width:16px; height:16px; accent-color: var(--sage); }

  .group{ margin-bottom: 22px; }
  .group-title{
    font-size: 12px; letter-spacing:.08em; text-transform: uppercase;
    color: var(--muted); font-weight:700; margin: 0 0 10px 2px;
    display:flex; align-items:center; gap:8px;
  }
  .group-title::after{ content:""; flex:1; height:1px; background: var(--line); }

  .task{
    display:flex; align-items:flex-start; gap:12px;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 13px 14px; margin-bottom: 9px; position: relative; overflow: hidden;
  }
  .task::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; }
  .task.tag-alejo::before{ background: var(--gold); }
  .task.tag-najwa::before{ background: var(--coral); }
  .task.tag-ambos::before{ background: var(--sage); }
  .check{
    width: 22px; height:22px; border-radius:6px; border: 2px solid var(--muted);
    flex-shrink:0; cursor:pointer; margin-top: 1px; display:flex; align-items:center; justify-content:center;
    font-size: 13px; color: transparent; transition: all .15s ease;
  }
  .check.checked{ background: var(--sage); border-color: var(--sage); color: #1F2A20; }
  .task-body{ flex:1; min-width:0; }
  .task-title-row{ display:flex; align-items:center; gap:6px; margin-bottom: 4px; }
  .priority-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .priority-dot.high{ background: var(--coral); }
  .priority-dot.medium{ background: var(--gold); }
  .priority-dot.low{ background: var(--sage); }
  .task-title{ font-size: 15px; font-weight: 600; }
  .task-meta{ display:flex; flex-wrap:wrap; gap: 6px; align-items:center; margin-bottom: 4px; }
  .chip{ font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight:600; background: var(--surface-2); color: var(--muted); }
  .chip.who{ color: #1F2A24; }
  .chip.tag-alejo.who{ background: var(--gold); }
  .chip.tag-najwa.who{ background: var(--coral); }
  .chip.tag-ambos.who{ background: var(--sage); }
  .chip.due{ background: var(--surface-2); color: var(--cream); }
  .chip.overdue{ background: var(--coral); color: #1F2A24; }
  .chip.recurring{ background: transparent; border: 1px solid var(--line); }
  .chip.reminder{ background: transparent; border: 1px solid var(--line); color: var(--sage); }

  .subtask-list{ margin: 6px 0 4px; display:flex; flex-direction:column; gap:4px; }
  .subtask-row{ display:flex; align-items:center; gap:8px; }
  .subtask-check{
    width:16px; height:16px; border-radius:4px; border: 2px solid var(--muted); flex-shrink:0;
    cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:10px; color:transparent;
  }
  .subtask-check.checked{ background: var(--sage); border-color: var(--sage); color:#1F2A24; }
  .subtask-text{ font-size: 13px; color: var(--muted); flex:1; }
  .subtask-text.done{ text-decoration: line-through; opacity:.6; }
  .subtask-del{ background:none; border:none; color: var(--muted); cursor:pointer; font-size:14px; padding:0 4px; }

  .photo-thumb-wrap{ position:relative; display:inline-block; margin-top:6px; }
  .photo-thumb{ width:70px; height:70px; object-fit:cover; border-radius:8px; cursor:pointer; display:block; }
  .photo-remove{
    position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%;
    background: var(--coral); color:#1F2A24; border:none; font-size:12px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }

  .task-actions{ display:flex; gap:14px; margin-top: 8px; }
  .task-actions button{
    background:none; border:none; color: var(--muted); cursor:pointer; font-size: 14px;
    padding: 0; display:flex; align-items:center; gap:4px;
  }
  .task-actions button:hover{ color: var(--sage); }
  .del-btn{ background:none; border:none; color: var(--muted); cursor:pointer; font-size: 18px; padding: 2px 6px; flex-shrink:0; line-height: 1; align-self:flex-start; }
  .del-btn:hover{ color: var(--coral); }

  .empty{ text-align:center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty .big{ font-family:'Fraunces',serif; font-size: 20px; color: var(--cream); margin-bottom:6px; }

  /* History */
  details.history{
    margin-top: 26px; border-top: 1px solid var(--line); padding-top: 14px;
  }
  details.history summary{
    cursor:pointer; font-size: 13px; font-weight:700; color: var(--muted);
    list-style: none; display:flex; align-items:center; gap:6px;
  }
  details.history summary::-webkit-details-marker{ display:none; }
  details.history summary::before{ content:"▸"; transition: transform .15s; }
  details.history[open] summary::before{ transform: rotate(90deg); }
  .history-clear{
    background:none; border:1px solid var(--line); color: var(--muted); font-size:11px;
    padding: 5px 10px; border-radius: 8px; cursor:pointer; margin: 10px 0 0;
  }
  .history-item{
    display:flex; align-items:center; gap:10px; padding: 9px 0;
    border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .history-item .h-title{ flex:1; color: var(--muted); text-decoration: line-through; }
  .history-item .h-date{ font-size: 11px; color: var(--muted); }

  /* Shopping list */
  .shopping-card{
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px;
  }
  .shopping-add{ display:flex; gap:8px; margin-bottom: 16px; }
  .shopping-add input{ flex:1; }
  .shopping-item{
    display:flex; align-items:center; gap:12px;
    background: var(--surface-2); border-radius: 10px; padding: 11px 12px; margin-bottom: 8px;
  }
  .shopping-text{ flex:1; font-size: 14px; }
  .shopping-text.done{ text-decoration: line-through; opacity:.5; }

  ::placeholder{ color: var(--muted); opacity: .7; }

  /* Lightbox */
  .lightbox{
    position: fixed; inset:0; background: rgba(15,20,17,0.92); z-index: 999;
    display:none; align-items:center; justify-content:center; padding: 24px;
  }
  .lightbox.show{ display:flex; }
  .lightbox img{ max-width: 100%; max-height: 100%; border-radius: 10px; }

  @media (max-width:380px){
    h1{ font-size: 28px; }
    .add-row{ flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Maison · Liste partagée</div>
    <h1>Tâches</h1>
    <div class="today" id="todayLabel"></div>
    <div class="sync-status">
      <span class="dot" id="syncDot"></span>
      <span id="syncText">Connexion…</span>
    </div>
  </header>

  <div class="view-tabs">
    <div class="view-tab active" data-view="tasks" onclick="setView('tasks')">Tâches</div>
    <div class="view-tab" data-view="shopping" onclick="setView('shopping')">Courses</div>
  </div>

  <div class="notif-banner" id="notifBanner" style="display:none;">
    <span>Activez les alertes pour recevoir des rappels tant que cette page est ouverte.</span>
    <button onclick="requestNotif()">Activer</button>
  </div>

  <!-- ===== TASKS VIEW ===== -->
  <div id="tasksView">
    <div class="who-tabs">
      <div class="who-tab active" data-who="todos" onclick="setFilter('todos')">Tous</div>
      <div class="who-tab" data-who="alejo" onclick="setFilter('alejo')">Alejo</div>
      <div class="who-tab" data-who="najwa" onclick="setFilter('najwa')">Najwa</div>
    </div>

    <div class="today-toggle-row">
      <label class="switch">
        <input type="checkbox" id="todayOnlyToggle" onchange="setTodayOnly(this.checked)">
        <span class="slider"></span>
      </label>
      <div>
        <div class="today-toggle-text">Aujourd'hui uniquement</div>
        <div class="today-toggle-sub">Inclut aussi les tâches en retard</div>
      </div>
    </div>

    <div class="template-row">
      <div class="template-label">Ajout rapide</div>
      <div class="template-chips" id="templateChips"></div>
    </div>

    <div class="add-card">
      <div class="add-row title-row">
        <input type="text" id="newTitle" placeholder="Nouvelle tâche, ex : Sortir les poubelles" maxlength="120">
        <button class="btn-add" onclick="addTask()">Ajouter</button>
      </div>
      <button class="toggle-more" onclick="toggleMore()">+ Catégorie, priorité, assignation, date, répétition et rappel</button>
      <div class="more-fields" id="moreFields">
        <div class="field">
          <label>Catégorie</label>
          <select id="newCategory">
            <option value="Général">Général</option>
            <option value="Maison">Maison</option>
            <option value="Cuisine">Cuisine</option>
            <option value="Ménage">Ménage</option>
            <option value="Achats">Achats</option>
            <option value="Finances">Finances</option>
            <option value="Animaux">Animaux</option>
          </select>
        </div>
        <div class="field">
          <label>Priorité</label>
          <select id="newPriority">
            <option value="low">Basse</option>
            <option value="medium" selected>Moyenne</option>
            <option value="high">Haute</option>
          </select>
        </div>
        <div class="field">
          <label>Assigner à</label>
          <select id="newAssignee">
            <option value="ambos">Ensemble</option>
            <option value="alejo">Alejo</option>
            <option value="najwa">Najwa</option>
          </select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="newDate">
        </div>
        <div class="field">
          <label>Heure</label>
          <input type="time" id="newTime">
        </div>
        <div class="field">
          <label>Répéter</label>
          <select id="newRecurring">
            <option value="none">Ne pas répéter</option>
            <option value="daily">Tous les jours</option>
            <option value="weekly">Chaque semaine</option>
            <option value="monthly">Chaque mois</option>
          </select>
        </div>
        <div class="field">
          <label>Rappel anticipé</label>
          <select id="newReminder">
            <option value="0">À l'échéance</option>
            <option value="1">1 jour avant</option>
            <option value="2">2 jours avant</option>
            <option value="7">1 semaine avant</option>
          </select>
        </div>
        <label class="checkbox-field">
          <input type="checkbox" id="newRotate">
          Alterner Alejo/Najwa à chaque répétition (ignoré si assigné à "Ensemble")
        </label>
      </div>
    </div>

    <div id="taskList"></div>

    <details class="history" id="historyDetails">
      <summary id="historySummary">Historique (0)</summary>
      <div id="historyList"></div>
      <button class="history-clear" onclick="clearHistory()">Vider l'historique</button>
    </details>
  </div>

  <!-- ===== SHOPPING VIEW ===== -->
  <div id="shoppingView" style="display:none;">
    <div class="shopping-card">
      <div class="shopping-add">
        <input type="text" id="newShoppingItem" placeholder="Ex : Lait, pain, lessive…" maxlength="120">
        <button class="btn-add" onclick="addShoppingItem()">Ajouter</button>
      </div>
      <div id="shoppingList"></div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="hideLightbox()">
  <img id="lightboxImg" src="" alt="Photo">
</div>

<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;" onchange="onPhotoSelected(event)">

<script src="./config.js"></script>
<script src="./app.js"></script>
</body>
</html>
